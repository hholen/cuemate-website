<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — CueMate</title>
  <link rel="icon" type="image/png" href="/app-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Newsreader:ital,opsz,wght@0,6..72,400;1,6..72,400&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

    :root {
      --coral: #e67e51;
      --bg: #0b0b0b;
      --text: #F5F2EE;
      --text-muted: #8a8580;
      --text-dim: #5a5550;
      --mono: 'DM Mono', 'SF Mono', Menlo, monospace;
      --serif: 'Newsreader', Georgia, serif;
    }

    html { -webkit-font-smoothing: antialiased; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      text-align: center;
      animation: fadeUp 0.8s ease both;
    }

    .code {
      font-family: var(--serif);
      font-size: clamp(80px, 15vw, 140px);
      font-weight: 400;
      letter-spacing: -0.03em;
      color: var(--text-dim);
      line-height: 1;
      margin-bottom: 16px;
    }

    .message {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 40px;
    }

    .cue {
      font-size: 13px;
      color: var(--text-dim);
      margin-bottom: 40px;
    }

    .cue span { color: #4a9b9b; }

    a {
      color: var(--coral);
      text-decoration: none;
      font-size: 14px;
      padding: 10px 24px;
      border-radius: 8px;
      border: 1px solid rgba(230,126,81,0.3);
      transition: all 0.2s;
    }

    a:hover {
      background: rgba(230,126,81,0.1);
      border-color: rgba(230,126,81,0.5);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    body::after {
      content: '';
      position: fixed; inset: 0;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      z-index: 9999;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="code">404</div>
    <p class="message">This page went off-script.</p>
    <p class="cue"><span>&lt;!-- pause &#8734; --&gt;</span></p>
    <a href="/">Back to CueMate</a>
  </div>
</body>
</html>
